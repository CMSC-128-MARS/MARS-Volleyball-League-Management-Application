name: Frontend CI

on:
  push:
    paths:
      - "team-mars-frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "team-mars-frontend/**"

jobs:
  lint-format-build:
    name: Lint, Format, and Build Frontend (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: team-mars-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Auto-Fix
        run: npm run format

      - name: Build frontend
        run: npm run build
